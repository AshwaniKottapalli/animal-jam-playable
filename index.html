<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Animal Jam — Adopt a Pet!</title>
  <link rel="preload" href="assets/fonts/Tiki-Island.otf" as="font" type="font/otf" crossorigin="anonymous" />
  <link rel="preload" href="assets/fonts/Dimbo Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
  <link rel="preload" href="assets/fonts/Comicraft - CCDigitalDelivery.otf" as="font" type="font/otf" crossorigin="anonymous" />
  <style>
    @font-face {
      font-family: 'Tiki Island';
      src: url('assets/fonts/Tiki-Island.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Dimbo';
      src: url('assets/fonts/Dimbo Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'CC Digital Delivery';
      src: url('assets/fonts/Comicraft - CCDigitalDelivery.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5e6c8;
      font-family: 'Tiki Island', Impact, Arial, sans-serif;
      /* Prevent iOS Safari bounce/overscroll */
      position: fixed;
      touch-action: none;
    }

    #app {
      position: fixed;
      overflow: hidden;
    }

    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
    }

    #ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Loading ── */
    .loading-screen {
      pointer-events: all;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      background: #f5e6c8;
    }

    .loading-logo {
      width: 62%;
      max-width: 340px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
    }

    .loading-bar-wrap {
      width: 55%; height: 18px;
      background: #7b4c2a;
      border-radius: 9px;
      overflow: hidden;
      border: 3px solid #5a3010;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5db33b, #7fd44d);
      border-radius: 6px;
      transition: width 0.15s ease;
    }

    .loading-text {
      font-family: 'Tiki Island', Impact, sans-serif;
      color: #7b4c2a;
      font-size: 1.2em;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
    }

    /* ── Box Reveal overlay ── */
    .box-reveal-overlay {
      pointer-events: all;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding-top: 5%;
    }

    .adopt-label {
      font-family: 'Tiki Island', Impact, sans-serif;
      font-size: clamp(2em, 8vw, 3em);
      color: #ffffff;
      -webkit-text-stroke: 3px #7b4c2a;
      text-shadow: 0 4px 0 #7b4c2a, 0 6px 12px rgba(0,0,0,0.4);
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .adopt-label.visible { opacity: 1; }

    .skip-hint {
      position: absolute;
      bottom: 3%;
      right: 4%;
      font-family: 'Tiki Island', Impact, sans-serif;
      font-size: 0.85em;
      color: rgba(255,255,255,0.65);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      letter-spacing: 1px;
    }

    /* ── Minigame overlay ── */
    .minigame-screen {
      pointer-events: none;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 4%;
    }

    .minigame-discover {
      font-family: 'Tiki Island', Impact, sans-serif;
      font-size: clamp(1em, 3.5vw, 1.4em);
      color: #ffffff;
      -webkit-text-stroke: 1.5px #5a3010;
      text-shadow: 0 2px 0 #5a3010, 0 4px 8px rgba(0,0,0,0.3);
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.6s ease;
      margin-bottom: 16px;
    }

    .minigame-discover.visible { opacity: 1; }

    .minigame-dots {
      display: flex; gap: 10px;
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 2px solid rgba(255,255,255,0.6);
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: #f7941d;
      border-color: #ffffff;
      transform: scale(1.3);
    }

    /* ── CTA overlay ── */
    .cta-screen {
      pointer-events: all;
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
    <div id="ui"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
